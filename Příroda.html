<!DOCTYPE html>

  <head>
    <title>Příroda</title>

    <link rel="stylesheet" href="style.css">
    <style>
  body {
 background: #006400	;
 }
 
    /* Nastavení pro obalující prvek */
.Galerie_Fotek {
  display: flex;         /* Toto je to kouzlo, které dá prvky vedle sebe */
  gap: 20px;             /* Udělá úhlednou mezeru 20 pixelů mezi obrázky */
  flex-wrap: wrap;       /* Velmi užitečné: pokud je obrazovka moc úzká (např. na mobilu), druhý obrázek automaticky skočí pod první */
}

/* Jemné stylování samotného popisku (volitelné) */
figcaption {
  text-align: center;    /* Vycentruje text popisku pod obrázkem */
  font-style: italic;    /*Udělá písmo kurzívou */
  color:  	#ffffff;           /* Změní barvu textu  */
  margin-top: 8px; /* Přidá malou mezeru mezi fotku a text */
  font-size:25px;   
}
figure {
      margin: 0;
    } 
    .Galerie_Fotek img{ /* definice ze to plati pro obrazek*/
    border: 5px solid white; /* toto dela rámeček */
    border-radius: 10px; /* zaoblení fotky*/
    }
    .Úvodni_Stránka {
  display: flex;            /* Aktivuje flexbox */
  width: 100%;             /* Box přes celou šířku */
  background-color: #333;  /* Barva pozadí menu */
}

.Úvodni_Stránka a {
  flex: 1;                 /* Každý odkaz zabere přesně 1/3 místa */
  text-align: center;      /* Vycentruje text v buňce */
  padding: 20px 0;         /* Horní a spodní odsazení (výška menu) */
  color: white;            /* Barva textu */
  text-decoration: none;   /* Odstraní podtržení odkazů */
  font-family: "Bookman Old Style";
  margin:0;; /* Modernější písmo */
  border-right: 1px solid #555; /* Volitelné: oddělovač mezi buňkami */
}

/* Odstranění čáry u posledního odkazu */
.Úvodni_Stránka a:last-child {
  border-right: none;
}

/* Efekt při najetí myší */
.Úvodni_Stránka a:hover {
  background-color: #555;
}
    </style>
